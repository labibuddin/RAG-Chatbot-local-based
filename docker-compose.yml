version: '3.8'

services:
  chromadb:
    image: chromadb/chroma
    ports:
      - "18000:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    networks:
      - rag-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  rag-network:
    driver: bridge
